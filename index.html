<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>11_Cart</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
background:black;
color:white;
padding:30px;
text-align:center;
}

.header h1{
color:orange;
font-size:45px;
margin:0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h2{
font-size:20px;
margin:0 0 10px;
}

.price{
font-size:24px;
font-weight:bold;
color:green;
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#555;
margin-bottom:15px;
}

.btn{
display:block;
background:#25D366;
color:white;
text-decoration:none;
text-align:center;
padding:12px;
border-radius:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
<h1>11_Cart</h1>
<p>Kids & Baby Store</p>
</div>

<div class="products" id="products">

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/1J7pd72gHhLKuFoYMjzWoSPUjuSDUYdVqUaTDaml8eyA/export?format=csv";

Papa.parse(sheetURL, {

download:true,
header:true,

complete:function(results){

const products = results.data;

products.forEach(product => {

const name = product["Name"];
const price = product["Price"];
const image = product["Thumbnail"];
const description = product["Description"];

if(name && image){

document.getElementById("products").innerHTML += `

<div class="card">

<img src="${image}">

<div class="info">

<h2>${name}</h2>

<div class="price">
Rs. ${price}
</div>

<div class="desc">
${description}
</div>

<a class="btn"
target="_blank"
href="https://wa.me/94786802323?text=I'm interested in ${name}">
Order on WhatsApp
</a>

</div>

</div>

`;

}

});

}

});

</script>

</body>
</html>Rs. ${price}
</div>

<p>${description}</p>

<a
class="whatsapp"
target="_blank"
href="https://wa.me/94786802323?text=I'm interested in ${name}">

Order on WhatsApp

</a>

</div>

</div>

`;

}

});

}

});

</script>
