<section class="section">

  <div class="section-title">
    <h2>Trending Products 🔥</h2>
    <p>Latest products from 11_CART</p>
  </div>

  <input
    type="text"
    id="searchInput"
    placeholder="Search products..."
    style="
      width:100%;
      padding:15px;
      margin-bottom:30px;
      border-radius:12px;
      border:1px solid #ccc;
      font-size:16px;
    "
  >

  <div class="products" id="productsContainer"></div>

</section>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vReVFFfTdnBOMgVF15qLDxBxyqbUKedALbb1_tFHpIEKWTD61_cVGqmuSY1Tn20VoqNd1nCyEp-Y1ur/pub?output=csv";

let allProducts = [];

async function loadProducts() {

  const response = await fetch(sheetURL);
  const csvText = await response.text();

  const rows = csvText.split('\n').slice(1);

  allProducts = [];

  rows.forEach(row => {

    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    const name = cols[0]?.replace(/"/g, "").trim();
    const category = cols[1]?.replace(/"/g, "").trim();
    const price = cols[2]?.replace(/"/g, "").trim();
    const image = cols[10]?.replace(/"/g, "").trim();

    if(name && image){

      allProducts.push({
        name,
        category,
        price,
        image
      });

    }

  });

  displayProducts(allProducts);

}

function displayProducts(products){

  const container =
  document.getElementById("productsContainer");

  container.innerHTML = "";

  products.forEach(product => {

    container.innerHTML += `

      <div class="product-card">

        <img
          src="${product.image}"
          alt="${product.name}"
          onerror="this.src='https://via.placeholder.com/400x300?text=11_CART';"
        >

        <div class="product-info">

          <h3>${product.name}</h3>

          <div class="price">
            Rs ${product.price}
          </div>

          <div class="product-buttons">

            <a
              class="details-btn"
              href="https://wa.me/94786802323?text=I want details about ${product.name}"
              target="_blank"
            >
              View Details
            </a>

            <a
              class="wa-btn"
              href="https://wa.me/94786802323?text=I want to order ${product.name}"
              target="_blank"
            >
              WhatsApp
            </a>

          </div>

        </div>

      </div>

    `;

  });

}

document
.getElementById("searchInput")
.addEventListener("input", function(){

  const value =
  this.value.toLowerCase();

  const filtered =
  allProducts.filter(product =>

    product.name.toLowerCase().includes(value) ||
    product.category.toLowerCase().includes(value)

  );

  displayProducts(filtered);

});

loadProducts();

</script>
