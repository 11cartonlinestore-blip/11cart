<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11Cart Sri Lanka - Intex Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .hero-bg { 
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                  url('https://i.imgur.com/faB3Ip4.jpeg') center/cover; 
    }
    .product-card { transition: all 0.3s ease; }
    .product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
    .tab-active { background-color: #22c55e; color: white; border: none; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-bed text-4xl text-blue-600"></i>
        <h1 class="text-3xl font-bold text-gray-800">11Cart</h1>
      </div>
      <a href="https://wa.me/94786802323" target="_blank"
         class="bg-green-500 hover:bg-green-600 text-white px-8 py-4 rounded-full font-semibold flex items-center gap-3 text-lg">
        <i class="fa-brands fa-whatsapp text-2xl"></i> WhatsApp
      </a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-bg text-white py-32 text-center">
    <div class="max-w-4xl mx-auto px-6">
      <h2 class="text-5xl md:text-6xl font-bold mb-6">Quality Intex Products</h2>
      <p class="text-2xl">Air Mattresses • Pools • Pumps • Baby Items</p>
    </div>
  </section>

  <!-- Search + Tabs -->
  <section class="bg-white py-8 border-b">
    <div class="max-w-6xl mx-auto px-6">
      <div class="mb-8 max-w-xl mx-auto">
        <div class="relative">
          <input type="text" id="search-input" 
                 class="w-full bg-gray-100 border border-gray-300 rounded-full py-4 px-6 pl-14 text-lg focus:outline-none"
                 placeholder="Search products...">
          <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
        </div>
      </div>
      <div class="flex flex-wrap justify-center gap-4" id="category-tabs"></div>
    </div>
  </section>

  <!-- Products Grid -->
  <section class="py-12">
    <div class="max-w-6xl mx-auto px-6">
      <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-8" id="products-grid"></div>
    </div>
  </section>

  <!-- CTA -->
  <section class="bg-green-600 text-white py-20 text-center">
    <div class="max-w-4xl mx-auto px-6">
      <h2 class="text-4xl font-bold mb-4">Ready to Buy?</h2>
      <p class="text-xl mb-8">Fast Delivery • Cash on Delivery Islandwide</p>
      <a href="https://wa.me/94786802323?text=Hi%2C%20I%20want%20to%20buy" 
         class="inline-flex items-center gap-4 bg-white text-green-600 px-10 py-5 rounded-full text-2xl font-bold">
        <i class="fa-brands fa-whatsapp text-4xl"></i> Order Now
      </a>
    </div>
  </section>

  <footer class="bg-gray-900 text-gray-400 py-10 text-center">
    <p class="text-2xl font-bold text-white">11Cart Sri Lanka</p>
    <p class="mt-6">Colombo | +94 78 680 2323</p>
  </footer>

  <script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbx25aomTXBYddLo0sMFf9fVYRTtF62PC0a2AhnFBoo5ezgY2jREN_Rg_zElbD2TR9M/exec";

    let allProducts = [];
    let currentCategory = 'All Products';

    async function loadProducts() {
      try {
        const response = await fetch(SHEET_URL);
        allProducts = await response.json();
        
        renderCategories();
        renderProducts(allProducts);
      } catch (error) {
        console.error(error);
        document.getElementById("products-grid").innerHTML = `
          <p class="col-span-full text-center text-red-500 py-12 text-xl">
            Unable to load products. Please refresh the page.
          </p>`;
      }
    }

    function renderCategories() {
      const cats = ['All Products', ...new Set(allProducts.map(p => p.Category).filter(Boolean))];
      const container = document.getElementById('category-tabs');
      container.innerHTML = '';

      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `px-7 py-3 rounded-full font-medium border transition-all ${cat === 'All Products' ? 'tab-active' : 'hover:bg-gray-100'}`;
        btn.textContent = cat;
        btn.onclick = () => {
          currentCategory = cat;
          filterProducts();
        };
        container.appendChild(btn);
      });
    }

    function filterProducts() {
      let filtered = allProducts;

      if (currentCategory !== 'All Products') {
        filtered = filtered.filter(p => p.Category === currentCategory);
      }

      const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
      if (searchTerm) {
        filtered = filtered.filter(p => 
          (p.Name && p.Name.toLowerCase().includes(searchTerm)) ||
          (p.Description && p.Description.toLowerCase().includes(searchTerm))
        );
      }

      renderProducts(filtered);
    }

    function renderProducts(products) {
      const container = document.getElementById('products-grid');
      container.innerHTML = '';

      if (products.length === 0) {
        container.innerHTML = `<p class="col-span-full text-center text-gray-500 py-12 text-xl">No products found.</p>`;
        return;
      }

      products.forEach(p => {
        const price = p['Discounted Price'] || p.Price || 'Contact Us';
        const img = p.Thumbnail || p.Image1 || p.Image || 'https://via.placeholder.com/400x300';

        const div = document.createElement('div');
        div.className = 'product-card bg-white rounded-3xl overflow-hidden shadow-md';
        div.innerHTML = `
          <img src="\( {img}" class="w-full h-64 object-cover" alt=" \){p.Name}">
          <div class="p-6">
            <h3 class="font-bold text-lg leading-tight">${p.Name}</h3>
            <p class="text-green-600 font-bold text-3xl mt-3">Rs. ${price}</p>
            <p class="text-sm text-gray-600 mt-4 line-clamp-3">${p.Description ? p.Description.substring(0, 130) : ''}...</p>
            <button onclick="orderNow('\( {(p.Name || '').replace(/'/g, '')} - Rs. \){price}')" 
                    class="mt-6 w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-semibold">
              Order via WhatsApp
            </button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function orderNow(text) {
      const message = `Hi! I'm interested in ${text}. Please send more details.`;
      window.open(`https://wa.me/94786802323?text=${encodeURIComponent(message)}`, '_blank');
    }

    // Event Listeners
    document.getElementById('search-input').addEventListener('input', filterProducts);

    // Load products
    window.onload = loadProducts;
  </script>
</body>
</html>
