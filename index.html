<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>11Cart Sri Lanka | Kids Toys & Baby Products</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans Sinhala',sans-serif;
}

body{
background:#f7f7f7;
color:#111;
}

nav{
background:white;
padding:18px 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
box-shadow:0 2px 15px rgba(0,0,0,0.06);
}

.logo-text{
font-size:38px;
font-weight:900;
}

.logo-text span{
color:#ff6b2c;
}

.whatsapp-btn{
background:#25D366;
color:white;
padding:14px 28px;
border-radius:16px;
font-weight:800;
text-decoration:none;
}

.hero{
background:#fff6f1;
padding:80px 5%;
text-align:center;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
line-height:1.8;
max-width:900px;
margin:auto;
}

.offer-banner{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px 5%;
background:white;
}

.offer-box{
background:#ffd9c7;
padding:22px;
border-radius:20px;
text-align:center;
font-size:20px;
font-weight:800;
cursor:pointer;
transition:0.3s;
}

.offer-box:hover{
transform:translateY(-5px);
}

.section{
padding:80px 5%;
}

.section-title{
text-align:center;
margin-bottom:50px;
}

.section-title h2{
font-size:48px;
}

#searchInput{
width:100%;
padding:18px;
border-radius:18px;
border:1px solid #ddd;
margin-bottom:45px;
font-size:17px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.product-card{
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.06);
transition:0.3s;
cursor:pointer;
}

.product-card:hover{
transform:translateY(-8px);
}

.product-image{
width:100%;
height:320px;
padding:20px;
display:flex;
align-items:center;
justify-content:center;
background:white;
}

.product-image img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.product-info{
padding:25px;
}

.product-info h3{
font-size:24px;
margin-bottom:10px;
}

.category{
color:#777;
margin-bottom:10px;
}

.price{
font-size:30px;
font-weight:900;
color:#ff6b2c;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
padding:20px;
}

.popup-content{
background:white;
width:100%;
max-width:900px;
border-radius:30px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
max-height:90vh;
overflow-y:auto;
}

.popup-image{
padding:30px;
background:#f7f7f7;
}

.popup-image img{
width:100%;
max-height:500px;
object-fit:contain;
}

.popup-details{
padding:35px;
}

.popup-details h2{
font-size:38px;
margin-bottom:15px;
}

.popup-price{
font-size:34px;
font-weight:900;
color:#ff6b2c;
margin:20px 0;
}

.popup-description{
line-height:1.8;
white-space:pre-line;
margin-bottom:25px;
}

.popup-wa{
display:inline-block;
background:#25D366;
color:white;
padding:16px 24px;
border-radius:14px;
font-weight:800;
text-decoration:none;
}

.popup-close{
position:absolute;
top:20px;
right:20px;
background:white;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
cursor:pointer;
}

@media(max-width:900px){

.hero h1{
font-size:42px;
}

.popup-content{
grid-template-columns:1fr;
}

.popup-details h2{
font-size:28px;
}

}

</style>
</head>
<body>

<nav>
<div class="logo-text">11<span>Cart</span></div>
<a class="whatsapp-btn" href="https://wa.me/94786802323" target="_blank">WhatsApp</a>
</nav>

<section class="hero">
<h1>Sri Lanka’s Trusted Kids Store</h1>
<p>
Kids toys, ride on jeeps, baby products, pools and more with islandwide delivery 🚚
<br><br>
💵 Cash On Delivery Available
</p>
</section>

<section class="offer-banner">

<div class="offer-box" onclick="filterCategory('Ride On')">
🚗 Ride On
</div>

<div class="offer-box" onclick="filterCategory('Baby Gear')">
🍼 Baby Gear
</div>

<div class="offer-box" onclick="filterCategory('Play Equipment')">
🧸 Play Equipment
</div>

<div class="offer-box" onclick="filterCategory('Inflatables & Pools')">
🏖️ Pools
</div>

</section>

<section class="section" id="products">

<div class="section-title">
<h2>Trending Products</h2>
</div>

<input type="text" id="searchInput" placeholder="Search products...">

<div class="products" id="productsContainer">
<div>Loading products...</div>
</div>

</section>

<div class="popup" id="productPopup">

<div class="popup-close" onclick="closePopup()">×</div>

<div class="popup-content">

<div class="popup-image">
<img id="popupImage" src="">
</div>

<div class="popup-details">
<h2 id="popupName"></h2>
<div class="popup-price" id="popupPrice"></div>
<div class="popup-description" id="popupDescription"></div>

<a id="popupWhatsApp" class="popup-wa" target="_blank">
Order on WhatsApp
</a>

</div>

</div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vReVFFfTdnBOMgVF15qLDxBxyqbUKedALbb1_tFHpIEKWTD61_cVGqmuSY1Tn20VoqNd1nCyEp-Y1ur/pub?output=csv";

let allProducts = [];

function displayProducts(products){

const container = document.getElementById("productsContainer");

container.innerHTML = "";

if(products.length === 0){
container.innerHTML = "No products found.";
return;
}

products.forEach(product => {

container.innerHTML += `

<div class="product-card"
onclick='openPopup(${JSON.stringify(product)})'>

<div class="product-image">
<img src="${product.image}">
</div>

<div class="product-info">
<h3>${product.name}</h3>
<div class="category">${product.category}</div>
<div class="price">Rs ${product.price}</div>
</div>

</div>

`;

});

}

function loadProducts(){

Papa.parse(sheetURL, {

download:true,
header:true,

complete:function(results){

const data = results.data;

allProducts = [];

data.forEach(item => {

const name = item.Name || "";
const category = item.Category || "General";
const price = item.Price || "0";
const image = item.Thumbnail || "";
const description = item.Description || "";
const availability = item.Availability || "Show";

if(name && availability !== "Hide"){

allProducts.push({
name:name,
category:category,
price:price,
image:image,
description:description
});

}

});

displayProducts(allProducts);

}

});

}

function filterCategory(category){

const filteredProducts = allProducts.filter(product =>
product.category.toLowerCase().trim() === category.toLowerCase().trim()
);

displayProducts(filteredProducts);

window.scrollTo({
top: document.getElementById("products").offsetTop - 100,
behavior: "smooth"
});

}

function openPopup(product){

document.getElementById("productPopup").style.display = "flex";

document.getElementById("popupImage").src = product.image;
document.getElementById("popupName").innerText = product.name;
document.getElementById("popupPrice").innerText = "Rs " + product.price;
document.getElementById("popupDescription").innerText = product.description;

document.getElementById("popupWhatsApp").href =
`https://wa.me/94786802323?text=I want to order ${product.name}`;

}

function closePopup(){
document.getElementById("productPopup").style.display = "none";
}


document.getElementById("searchInput")
.addEventListener("input", function(){

const value = this.value.toLowerCase();

const filtered = allProducts.filter(product =>
product.name.toLowerCase().includes(value)
||
product.category.toLowerCase().includes(value)
);

displayProducts(filtered);

});

loadProducts();

</script>

</body>
</html>
