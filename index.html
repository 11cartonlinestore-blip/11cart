<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11Cart Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
transition:0.3s;
}

.dark{
background:#111;
color:white;
}

.dark .card{
background:#1e1e1e;
color:white;
}

.header{
background:#111;
color:white;
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
font-size:30px;
}

.top-buttons{
display:flex;
gap:10px;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.dark-btn{
background:#333;
color:white;
}

.download-btn{
background:#ff6b2c;
color:white;
}

.card{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select{
padding:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
width:100%;
}

.add-btn{
background:#25D366;
color:white;
margin-top:20px;
width:100%;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:20px;
}

.stat-box{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.dark .stat-box{
background:#1e1e1e;
}

.stat-box h2{
font-size:38px;
margin-bottom:10px;
}

.table-wrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:15px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#111;
color:white;
}

img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.edit-btn{
background:#111;
color:white;
margin-right:8px;
}

.delete-btn{
background:red;
color:white;
}

.search{
margin-bottom:20px;
}

.status{
padding:8px 12px;
border-radius:10px;
font-size:14px;
font-weight:bold;
}

.instock{
background:#d4edda;
color:#155724;
}

.outstock{
background:#f8d7da;
color:#721c24;
}

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
gap:15px;
}

}

</style>
</head>
<body>

<script>

const adminPassword = "11cartadmin";

const enteredPassword = prompt("Enter Admin Password");

if(enteredPassword !== adminPassword){
alert("Wrong Password");
window.location.href = "https://google.com";
}

</script>

<div class="header">
<h1>11Cart Admin Panel</h1>

<div class="top-buttons">
<button class="dark-btn" onclick="toggleDarkMode()">
Dark Mode
</button>

<button class="download-btn" onclick="downloadCSV()">
Download CSV
</button>
</div>

</div>

<div class="stats">

<div class="stat-box">
<h2 id="totalProducts">0</h2>
<p>Total Products</p>
</div>

<div class="stat-box">
<h2 id="inStockCount">0</h2>
<p>In Stock</p>
</div>

<div class="stat-box">
<h2 id="outStockCount">0</h2>
<p>Out Of Stock</p>
</div>

</div>

<div class="card">

<h2 style="margin-bottom:20px;">
Add / Edit Product
</h2>

<div class="form-grid">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="category" placeholder="Category">

<input type="number" id="price" placeholder="Price">

<input type="number" id="stock" placeholder="Stock Quantity">

<input type="text" id="image" placeholder="Image URL">

<select id="status">
<option>In Stock</option>
<option>Out Of Stock</option>
</select>

</div>

<button class="add-btn" onclick="saveProduct()">
Save Product
</button>

</div>

<div class="card">

<input
class="search"
type="text"
id="searchInput"
placeholder="Search products..."
>

<div class="table-wrap">

<table>
<thead>
<tr>
<th>Image</th>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Stock</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="productTable">
</tbody>

</table>

</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let editIndex = -1;

function updateStats(){

const total = products.length;

const inStock = products.filter(p =>
p.status === "In Stock").length;

const outStock = products.filter(p =>
p.status === "Out Of Stock").length;


document.getElementById("totalProducts").innerText = total;
document.getElementById("inStockCount").innerText = inStock;
document.getElementById("outStockCount").innerText = outStock;

}

function renderProducts(data){

const table = document.getElementById("productTable");

table.innerHTML = "";

if(data.length === 0){

table.innerHTML = `
<tr>
<td colspan="7">No Products Found</td>
</tr>
`;

return;

}

data.forEach((product,index)=>{

const statusClass =
product.status === "In Stock"
?
"instock"
:
"outstock";


table.innerHTML += `

<tr>

<td>
<img src="${product.image}">
</td>

<td>${product.name}</td>
<td>${product.category}</td>
<td>Rs ${product.price}</td>
<td>${product.stock}</td>

<td>
<span class="status ${statusClass}">
${product.status}
</span>
</td>

<td>
<button
class="edit-btn"
onclick="editProduct(${index})"
>
Edit
</button>

<button
class="delete-btn"
onclick="deleteProduct(${index})"
>
Delete
</button>
</td>

</tr>

`;

});

updateStats();

}

function saveProduct(){

const product = {
name:document.getElementById("name").value,
category:document.getElementById("category").value,
price:document.getElementById("price").value,
stock:document.getElementById("stock").value,
image:document.getElementById("image").value,
status:document.getElementById("status").value
};

if(!product.name || !product.price){
alert("Fill Required Fields");
return;
}

if(editIndex === -1){
products.push(product);
}else{
products[editIndex] = product;
editIndex = -1;
}

localStorage.setItem(
"products",
JSON.stringify(products)
);

renderProducts(products);

clearForm();

}

function editProduct(index){

const product = products[index];

editIndex = index;

document.getElementById("name").value = product.name;
document.getElementById("category").value = product.category;
document.getElementById("price").value = product.price;
document.getElementById("stock").value = product.stock;
document.getElementById("image").value = product.image;
document.getElementById("status").value = product.status;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function deleteProduct(index){

if(confirm("Delete Product?")){

products.splice(index,1);

localStorage.setItem(
"products",
JSON.stringify(products)
);

renderProducts(products);

}

}

function clearForm(){

document.getElementById("name").value = "";
document.getElementById("category").value = "";
document.getElementById("price").value = "";
document.getElementById("stock").value = "";
document.getElementById("image").value = "";
document.getElementById("status").value = "In Stock";

}

function toggleDarkMode(){

document.body.classList.toggle("dark");

localStorage.setItem(
"darkMode",
document.body.classList.contains("dark")
);

}

if(localStorage.getItem("darkMode") === "true"){
document.body.classList.add("dark");
}

function downloadCSV(){

let csv =
"Name,Category,Price,Stock,Thumbnail,Status
";

products.forEach(product=>{

csv += `${product.name},${product.category},${product.price},${product.stock},${product.image},${product.status}
`;

});

const blob = new Blob([csv], {
type:'text/csv'
});

const url = URL.createObjectURL(blob);

const a = document.createElement('a');
a.href = url;
a.download = 'products.csv';
a.click();

}

document
.getElementById("searchInput")
.addEventListener("input",function(){

const value = this.value.toLowerCase();

const filtered = products.filter(product =>

product.name.toLowerCase().includes(value)
||
product.category.toLowerCase().includes(value)

);

renderProducts(filtered);

});

renderProducts(products);

</script>

</body>
</html>
